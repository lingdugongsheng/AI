<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多代理智能客服</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f0f9ff 0%, #e6f7ff 50%, #d1f0ff 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .chat-container {
            width: 100%;
            max-width: 850px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 123, 255, 0.2);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 85vh;
        }

        .chat-header {
            background: linear-gradient(135deg, #096dd9 0%, #1890ff 100%);
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 1.4rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            position: relative;
        }

        .chat-header i {
            font-size: 1.6rem;
        }

        .stats-badge {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.2);
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .stats-badge i {
            font-size: 0.9rem;
        }

        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background: #fafcff;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 85%;
            padding: 16px 20px;
            border-radius: 18px;
            line-height: 1.7;
            position: relative;
            animation: fadeIn 0.3s ease;
            box-shadow: 0 3px 12px rgba(0, 0, 0, 0.08);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .user-message {
            background: linear-gradient(135deg, #096dd9 0%, #1890ff 100%);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .ai-message {
            background: white;
            color: #333;
            align-self: flex-start;
            border: 1px solid #e8f4ff;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 10px rgba(9, 109, 217, 0.1);
        }

        .message-content {
            white-space: pre-wrap;
            word-wrap: break-word;
            font-size: 1rem;
        }

        .message-meta {
            margin-top: 12px;
            padding-top: 10px;
            border-top: 1px dashed #e8f4ff;
            font-size: 0.85rem;
            color: #666;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 4px;
            background: #f5f9ff;
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 0.8rem;
        }

        .meta-item i {
            color: #1890ff;
            font-size: 0.9rem;
        }

        .intent-badge {
            font-weight: 600;
            color: #096dd9;
        }

        .confidence-badge, .quality-badge, .escalation-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 10px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .confidence-high {
            background: #d9f7be;
            color: #52c41a;
        }

        .confidence-medium {
            background: #fff7e6;
            color: #fa8c16;
        }

        .confidence-low {
            background: #fff1f0;
            color: #ff4d4f;
        }

        .quality-excellent {
            background: #d9f7be;
            color: #52c41a;
        }

        .quality-good {
            background: #fff7e6;
            color: #fa8c16;
        }

        .quality-fair {
            background: #fff1f0;
            color: #ff4d4f;
        }

        .escalation-yes {
            background: #fff1f0;
            color: #ff4d4f;
            border: 1px solid #ffccc7;
        }

        .escalation-no {
            background: #d9f7be;
            color: #52c41a;
        }

        .chat-input-area {
            padding: 15px 20px;
            background: white;
            border-top: 1px solid #e8f4ff;
        }

        .chat-input {
            display: flex;
            gap: 10px;
            background: #f8fbff;
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 2px 10px rgba(9, 109, 217, 0.1);
            border: 2px solid #e8f4ff;
            transition: all 0.3s;
        }

        .chat-input:focus-within {
            border-color: #1890ff;
            box-shadow: 0 4px 15px rgba(9, 109, 217, 0.2);
        }

        #message-input {
            flex: 1;
            border: none;
            padding: 14px 18px;
            font-size: 1rem;
            outline: none;
            resize: none;
            background: transparent;
            color: #333;
            max-height: 150px;
            overflow-y: auto;
        }

        #message-input::placeholder {
            color: #999;
            font-size: 0.95rem;
        }

        #message-input:focus {
            box-shadow: 0 0 0 2px rgba(9, 109, 217, 0.2);
        }

        .send-btn {
            background: linear-gradient(135deg, #096dd9 0%, #1890ff 100%);
            color: white;
            border: none;
            width: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.15rem;
            transition: all 0.25s;
            border-radius: 18px;
        }

        .send-btn:hover {
            background: linear-gradient(135deg, #0050b3 0%, #096dd9 100%);
            transform: scale(1.08);
            box-shadow: 0 4px 12px rgba(9, 109, 217, 0.3);
        }

        .send-btn:active {
            transform: scale(0.98);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            background: #b3d4ff;
        }

        .loading-indicator {
            text-align: center;
            padding: 12px;
            color: #096dd9;
            font-size: 0.95rem;
            display: none;
        }

        .spinner {
            border: 3px solid rgba(9, 109, 217, 0.3);
            border-top: 3px solid #096dd9;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            margin: 0 auto 8px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .welcome-message {
            text-align: center;
            padding: 70px 30px;
            color: #666;
        }

        .welcome-icon {
            font-size: 4rem;
            color: #096dd9;
            margin-bottom: 25px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .welcome-title {
            font-size: 2rem;
            font-weight: 800;
            color: #096dd9;
            margin-bottom: 15px;
            background: linear-gradient(135deg, #096dd9 0%, #1890ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .welcome-text {
            font-size: 1.05rem;
            color: #666;
            margin-bottom: 25px;
            line-height: 1.7;
        }

        .features-list {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .feature-item {
            text-align: center;
            min-width: 120px;
        }

        .feature-icon {
            font-size: 2rem;
            color: #096dd9;
            margin-bottom: 8px;
        }

        .feature-label {
            font-size: 0.9rem;
            color: #333;
            font-weight: 600;
        }

        .status-bar {
            background: linear-gradient(135deg, #f8fbff 0%, #e8f4ff 100%);
            padding: 10px 15px;
            text-align: center;
            font-size: 0.88rem;
            color: #666;
            border-top: 1px solid #d9e8ff;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .status-connected {
            color: #52c41a;
            font-weight: 600;
        }

        .status-disconnected {
            color: #ff4d4f;
            font-weight: 600;
        }

        .stats-counter {
            display: flex;
            gap: 15px;
            font-size: 0.85rem;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .stat-item i {
            color: #096dd9;
        }

        /* 滚动条样式 */
        .chat-messages::-webkit-scrollbar {
            width: 8px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: #f0f7ff;
            border-radius: 4px;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: #096dd9;
            border-radius: 4px;
        }

        .chat-messages::-webkit-scrollbar-thumb:hover {
            background: #0050b3;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .chat-container {
                height: 92vh;
                max-width: 100%;
                border-radius: 16px;
            }

            .message {
                max-width: 95%;
                padding: 14px 16px;
            }

            .chat-header {
                font-size: 1.2rem;
                padding: 15px;
            }

            .stats-badge {
                font-size: 0.75rem;
                padding: 3px 8px;
            }

            .welcome-icon {
                font-size: 2.8rem;
            }

            .welcome-title {
                font-size: 1.6rem;
            }

            .features-list {
                gap: 15px;
            }

            .feature-icon {
                font-size: 1.6rem;
            }

            .status-bar {
                flex-direction: column;
                gap: 8px;
            }
        }

        @media (max-width: 480px) {
            .chat-container {
                height: 95vh;
            }

            .features-list {
                gap: 10px;
            }

            .feature-item {
                min-width: 90px;
            }

            .feature-label {
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <i class="fas fa-comments"></i>
            <span>多代理智能客服系统</span>
            <div class="stats-badge" id="total-queries">
                <i class="fas fa-chart-line"></i>
                <span>0 次对话</span>
            </div>
        </div>

        <div class="chat-messages" id="chat-messages">
            <div class="welcome-message">
                <div class="welcome-icon">
                    <i class="fas fa-robot"></i>
                </div>
                <h2 class="welcome-title">欢迎使用智能客服</h2>
                <p class="welcome-text">
                    这是一个基于 LangChain 和 LangGraph 的多代理智能客服系统。<br>
                    我可以帮您处理：<strong>技术支持</strong>、<strong>订单服务</strong>、<strong>产品咨询</strong> 等问题。
                </p>

                <div class="features-list">
                    <div class="feature-item">
                        <div class="feature-icon">
                            <i class="fas fa-headset"></i>
                        </div>
                        <div class="feature-label">技术支持</div>
                    </div>
                    <div class="feature-item">
                        <div class="feature-icon">
                            <i class="fas fa-shopping-cart"></i>
                        </div>
                        <div class="feature-label">订单查询</div>
                    </div>
                    <div class="feature-item">
                        <div class="feature-icon">
                            <i class="fas fa-box-open"></i>
                        </div>
                        <div class="feature-label">产品咨询</div>
                    </div>
                    <div class="feature-item">
                        <div class="feature-icon">
                            <i class="fas fa-user-tie"></i>
                        </div>
                        <div class="feature-label">人工客服</div>
                    </div>
                </div>

                <p class="welcome-text" style="margin-top: 25px; font-size: 0.9rem; color: #999;">
                    💡 <strong>提示：</strong>直接输入您的问题，例如：<br>
                    • "我的订单什么时候到？"<br>
                    • "蓝牙耳机连接不上怎么办？"<br>
                    • "推荐一款智能手表"
                </p>
            </div>
        </div>

        <div class="chat-input-area">
            <div class="chat-input">
                <textarea id="message-input"
                          placeholder="请输入您的问题... (按 Enter 发送)"
                          rows="1"></textarea>
                <button class="send-btn" id="send-message" disabled>
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
            <div class="loading-indicator" id="loading-indicator">
                <div class="spinner"></div>
                <div>AI 正在思考中...</div>
            </div>
        </div>

        <div class="status-bar">
            <span id="api-status">API状态: <span class="status-disconnected">未连接</span></span>
            <div class="stats-counter">
                <span class="stat-item">
                    <i class="fas fa-bolt"></i>
                    <span id="avg-confidence">0%</span>
                </span>
                <span class="stat-item">
                    <i class="fas fa-star"></i>
                    <span id="avg-quality">0%</span>
                </span>
            </div>
        </div>
    </div>

    <script>
        // ==================== 配置 ====================
        const API_BASE_URL = 'http://localhost:8000';
        const chatMessages = document.getElementById('chat-messages');
        const messageInput = document.getElementById('message-input');
        const sendMessageBtn = document.getElementById('send-message');
        const loadingIndicator = document.getElementById('loading-indicator');
        const apiStatusEl = document.getElementById('api-status');
        const totalQueriesEl = document.getElementById('total-queries');
        const avgConfidenceEl = document.getElementById('avg-confidence');
        const avgQualityEl = document.getElementById('avg-quality');

        let isLoading = false;
        let totalQueries = 0;
        let avgConfidence = 0;
        let avgQuality = 0;

        // ==================== 工具函数 ====================

        function showLoading() {
            isLoading = true;
            loadingIndicator.style.display = 'block';
            sendMessageBtn.disabled = true;
            messageInput.disabled = true;
        }

        function hideLoading() {
            isLoading = false;
            loadingIndicator.style.display = 'none';
            sendMessageBtn.disabled = false;
            messageInput.disabled = false;
        }

        function addMessage(content, isUser = false, metadata = {}) {
            // 移除欢迎消息（如果是第一条消息）
            if (chatMessages.children.length === 1 &&
                chatMessages.firstElementChild.classList.contains('welcome-message')) {
                chatMessages.innerHTML = '';
            }

            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user-message' : 'ai-message'}`;

            if (!isUser) {
                // AI 消息 - 包含元数据
                const { intent, confidence, quality_score, escalated } = metadata;

                messageDiv.innerHTML = `
                    <div class="message-content">${content.replace(/\n/g, '<br>')}</div>
                    <div class="message-meta">
                        <span class="meta-item">
                            <i class="fas fa-brain"></i>
                            <span class="intent-badge">意图: ${getIntentLabel(intent)}</span>
                        </span>
                        <span class="meta-item">
                            <i class="fas fa-chart-bar"></i>
                            <span class="confidence-badge ${getConfidenceClass(confidence)}">
                                置信度: ${(confidence * 100).toFixed(0)}%
                            </span>
                        </span>
                        <span class="meta-item">
                            <i class="fas fa-medal"></i>
                            <span class="quality-badge ${getQualityClass(quality_score)}">
                                质量: ${(quality_score * 100).toFixed(0)}%
                            </span>
                        </span>
                        <span class="meta-item">
                            <i class="fas fa-user-headset"></i>
                            <span class="escalation-badge ${escalated ? 'escalation-yes' : 'escalation-no'}">
                                ${escalated ? '需人工' : '自动处理'}
                            </span>
                        </span>
                    </div>
                `;
            } else {
                // 用户消息
                messageDiv.innerHTML = `<div class="message-content">${escapeHtml(content)}</div>`;
            }

            chatMessages.appendChild(messageDiv);
            scrollToBottom();
        }

        function scrollToBottom() {
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function getIntentLabel(intent) {
            const labels = {
                'tech_support': '技术支持',
                'order_service': '订单服务',
                'product_consult': '产品咨询',
                'escalate': '人工客服'
            };
            return labels[intent] || intent;
        }

        function getConfidenceClass(confidence) {
            if (confidence >= 0.8) return 'confidence-high';
            if (confidence >= 0.6) return 'confidence-medium';
            return 'confidence-low';
        }

        function getQualityClass(quality) {
            if (quality >= 0.85) return 'quality-excellent';
            if (quality >= 0.7) return 'quality-good';
            return 'quality-fair';
        }

        function showError(message) {
            const errorDiv = document.createElement('div');
            errorDiv.className = 'message ai-message';
            errorDiv.innerHTML = `
                <div class="message-content" style="color: #ff4d4f;">
                    <i class="fas fa-exclamation-circle"></i> ${escapeHtml(message)}
                </div>
            `;
            chatMessages.appendChild(errorDiv);
            scrollToBottom();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function updateStats() {
            totalQueriesEl.querySelector('span:last-child').textContent = `${totalQueries} 次对话`;
            avgConfidenceEl.textContent = `${Math.round(avgConfidence * 100)}%`;
            avgQualityEl.textContent = `${Math.round(avgQuality * 100)}%`;
        }

        // ==================== API 调用 ====================

        async function checkApiConnection() {
            try {
                const response = await fetch(`${API_BASE_URL}/health`);
                if (response.ok) {
                    const data = await response.json();
                    apiStatusEl.innerHTML = 'API状态: <span class="status-connected">✅ 已连接</span>';

                    // 获取统计数据
                    const statsResponse = await fetch(`${API_BASE_URL}/stats`);
                    if (statsResponse.ok) {
                        const statsData = await statsResponse.json();
                        totalQueries = statsData.total_queries || 0;
                        avgConfidence = statsData.avg_confidence || 0;
                        avgQuality = statsData.avg_quality_score || 0;
                        updateStats();
                    }

                    return true;
                }
            } catch (error) {
                apiStatusEl.innerHTML = 'API状态: <span class="status-disconnected">❌ 连接失败</span>';
                console.error('API 连接失败:', error);
                showError('无法连接到客服系统，请检查后端服务是否启动');
                return false;
            }
        }

        async function sendChatMessage() {
            const message = messageInput.value.trim();
            if (!message || isLoading) return;

            // 添加用户消息
            addMessage(message, true);
            messageInput.value = '';
            messageInput.style.height = 'auto';
            showLoading();

            try {
                const response = await fetch(`${API_BASE_URL}/chat`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: message,
                        use_history: true
                    })
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.detail || `HTTP error! status: ${response.status}`);
                }

                const data = await response.json();

                // 添加 AI 响应
                addMessage(data.response, false, {
                    intent: data.intent,
                    confidence: data.confidence,
                    quality_score: data.quality_score,
                    escalated: data.escalated
                });

                // 更新统计数据
                totalQueries++;
                // 使用移动平均更新
                avgConfidence = (avgConfidence * (totalQueries - 1) + data.confidence) / totalQueries;
                avgQuality = (avgQuality * (totalQueries - 1) + data.quality_score) / totalQueries;
                updateStats();

            } catch (error) {
                showError(`对话失败: ${error.message}`);
                console.error('对话错误:', error);
            } finally {
                hideLoading();
            }
        }

        // ==================== 事件监听 ====================

        document.addEventListener('DOMContentLoaded', async function() {
            // 检查 API 连接
            await checkApiConnection();

            // 发送消息
            sendMessageBtn.addEventListener('click', sendChatMessage);

            // 回车发送（Enter）
            messageInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendChatMessage();
                }
            });

            // 自动调整文本框高度
            messageInput.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = Math.min(this.scrollHeight, 150) + 'px';
                sendMessageBtn.disabled = this.value.trim() === '';
            });

            // 初次聚焦
            setTimeout(() => {
                messageInput.focus();
            }, 300);
        });
    </script>
</body>
</html>
